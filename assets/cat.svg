<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 96" width="108" height="96">

  <!-- corpo principal com bounce -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -4; 0 0" dur="2s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;0.4;1"
      keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>

    <!-- orelhas -->
    <rect x="18" y="6"  width="6"  height="6"  fill="#a78bfa"/>
    <rect x="60" y="6"  width="6"  height="6"  fill="#a78bfa"/>
    <rect x="18" y="12" width="12" height="6"  fill="#a78bfa"/>
    <rect x="54" y="12" width="12" height="6"  fill="#a78bfa"/>

    <!-- cabeça linhas 2–3 -->
    <rect x="12" y="18" width="60" height="12" fill="#c4b5fd"/>

    <!-- linha 4 — ao redor dos olhos -->
    <rect x="12" y="30" width="6"  height="6"  fill="#c4b5fd"/>
    <rect x="30" y="30" width="24" height="6"  fill="#c4b5fd"/>
    <rect x="66" y="30" width="6"  height="6"  fill="#c4b5fd"/>

    <!-- olhos abertos -->
    <g>
      <rect x="18" y="30" width="12" height="6" fill="#2e1065"/>
      <rect x="54" y="30" width="12" height="6" fill="#2e1065"/>
      <rect x="20" y="31" width="3"  height="3" fill="#e9d5ff"/>
      <rect x="56" y="31" width="3"  height="3" fill="#e9d5ff"/>
      <animate attributeName="opacity"
        values="1;1;0;1;1" keyTimes="0;0.46;0.5;0.54;1"
        dur="5s" repeatCount="indefinite"/>
    </g>
    <!-- olhos fechados (piscada) -->
    <g>
      <rect x="18" y="32" width="12" height="2" fill="#2e1065"/>
      <rect x="54" y="32" width="12" height="2" fill="#2e1065"/>
      <animate attributeName="opacity"
        values="0;0;1;0;0" keyTimes="0;0.46;0.5;0.54;1"
        dur="5s" repeatCount="indefinite"/>
    </g>

    <!-- linha 5 -->
    <rect x="12" y="36" width="60" height="6" fill="#c4b5fd"/>

    <!-- linha 6 com nariz rosa -->
    <rect x="12" y="42" width="24" height="6" fill="#c4b5fd"/>
    <rect x="36" y="42" width="12" height="6" fill="#f9a8d4"/>
    <rect x="48" y="42" width="24" height="6" fill="#c4b5fd"/>

    <!-- corpo linhas 7–9 -->
    <rect x="12" y="48" width="60" height="18" fill="#c4b5fd"/>

    <!-- quadril linha 10 -->
    <rect x="12" y="66" width="18" height="6" fill="#c4b5fd"/>
    <rect x="54" y="66" width="18" height="6" fill="#c4b5fd"/>

    <!-- pernas linhas 11–12 -->
    <rect x="18" y="72" width="12" height="12" fill="#c4b5fd"/>
    <rect x="54" y="72" width="12" height="12" fill="#c4b5fd"/>

    <!-- patinhas linha 13 -->
    <rect x="12" y="84" width="24" height="6" fill="#c4b5fd"/>
    <rect x="48" y="84" width="24" height="6" fill="#c4b5fd"/>

    <!-- rabo (balança em torno da base) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-12,75,63; 12,75,63; -12,75,63" dur="0.9s"
        repeatCount="indefinite" calcMode="spline"
        keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
      <rect x="72" y="60" width="6" height="6" fill="#a78bfa"/>
      <rect x="72" y="54" width="6" height="6" fill="#a78bfa"/>
      <rect x="78" y="48" width="6" height="6" fill="#a78bfa"/>
      <rect x="78" y="42" width="6" height="6" fill="#a78bfa"/>
      <rect x="78" y="36" width="6" height="6" fill="#a78bfa"/>
      <rect x="72" y="30" width="6" height="6" fill="#a78bfa"/>
    </g>

  </g>
</svg>
